server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/smart_farm?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root # 替换为你自己的本地密码或 Docker 密码
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 控制台打印 SQL，方便本地排错
    map-underscore-to-camel-case: true

# Sa-Token 配置
sa-token:
  token-name: Authorization # Header 中携带 token 的名称
  timeout: 86400 # token 有效期，单位秒 (当前为 1 天)
  active-timeout: -1 # token 最低活跃频率 (设为 -1 代表不限制)
  is-concurrent: true # 是否允许同一账号并发登录 (允许多地登录)
  is-share: true # 在多人登录同一账号时，是否共用一个 token
  token-style: uuid # token 风格

