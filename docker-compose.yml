version: '3.8'
services:
  mysql:
    image: mysql:8.0.33
    container_name: smart-farm-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smart_farm
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      # 挂载你的创世脚本，首次启动容器时会自动执行建表
      - ./packages/server/db/init_schema.sql:/docker-entrypoint-initdb.d/init.sql
      # (可选) 挂载数据卷以持久化数据
      - mysql-data:/var/lib/mysql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data: